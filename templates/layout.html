<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PromptVault</title>
    <link rel="stylesheet" href="/static/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔒</text></svg>">
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
</head>
<body>
    <header>
        <a href="/" class="logo">
            <span class="logo-icon"><i class="fas fa-vault"></i></span>
            PromptVault
        </a>
        <nav>
            <a href="/" class="nav-link">Gallery</a>
            <a href="/about" class="nav-link">About</a>
            <a href="/add" class="btn btn-primary">
                <i class="fas fa-plus"></i> Add Prompt
            </a>
        </nav>
    </header>

    <!-- Flash messages -->
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            <div class="flash-container">
                {% for category, message in messages %}
                    <div class="flash flash-{{ category }}">
                        <i class="fas fa-{{ 'check-circle' if category == 'success' else 'exclamation-circle' }}"></i>
                        {{ message }}
                    </div>
                {% endfor %}
            </div>
        {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}

    <footer>
        <p>&copy; 2026 PromptVault &mdash; CS50x Final Project</p>
    </footer>
</body>
</html>
